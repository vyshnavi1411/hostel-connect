services:
  # Database Service (Still kept for local use if needed, but backend connects to cloud)
  mongo:
    image: mongo:latest
    container_name: hostelconnect-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - nexus-network

  # Backend Service
  backend:
    build: ./backend
    container_name: hostelconnect-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongo
    networks:
      - nexus-network

  # Frontend Service
  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_SOCKET_URL=${VITE_SOCKET_URL}
    container_name: hostelconnect-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - nexus-network

networks:
  nexus-network:
    driver: bridge

volumes:
  mongo-data:
