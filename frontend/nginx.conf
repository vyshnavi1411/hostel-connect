server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend container (internal Docker network)
    # Note: In a real production setup, you'd use the service name 'backend'
    # However, for local dev with exposed ports, 'localhost:5000' is often easier for the browser.
    # We will keep the browser-to-backend communication direct via localhost for now.

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
